<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RACH COMMAND CENTER v5.6</title>
    <style>
        :root {
            --primary: #ff0000; 
            --gemini-blue: #4285f4;
            --wa-green: #25D366;
            --insta-pink: #E1306C;
            --chess-green: #779556;
            --canva-blue: #00C4CC;
            --ragnarok-brown: #8B4513;
            --monitor-bg: rgba(0, 0, 0, 0.95);
        }

        body {
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px),
                radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            background-size: 100% 2px, 50px 50px, 50px 50px, 100% 100%;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 20px;
            overflow: hidden;
        }

        #clock { font-size: 3.5rem; font-weight: bold; text-shadow: 0 0 15px var(--primary); margin-bottom: 10px;}

        /* STATS PANEL */
        .stats-panel {
            background: var(--monitor-bg);
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            width: 440px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
        }
        .stats-grid { display: flex; gap: 20px; justify-content: center; }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            width: 160px;
            border-bottom: 3px solid var(--primary);
        }
        .stat-value { font-size: 2rem; font-weight: bold; text-shadow: 0 0 10px var(--primary); }
        .stat-label { font-size: 0.6rem; color: #ff4444; letter-spacing: 2px; margin-bottom: 5px; }

        /* SLIDE-OUT RAGNAROK DRAWER */
        .drawer-container {
            position: fixed;
            right: -310px; 
            top: 50px;
            width: 350px;
            height: 500px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: flex;
        }
        .drawer-container.open { right: 0; }
        .drawer-handle {
            width: 40px; height: 140px;
            background: var(--primary);
            color: black;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 10px 0 0 10px;
            font-weight: bold; font-size: 0.7rem;
            writing-mode: vertical-rl; text-orientation: mixed;
            box-shadow: -5px 0 15px rgba(255, 0, 0, 0.5);
            margin-top: 20px;
        }
        .drawer-content {
            width: 310px; background: var(--monitor-bg);
            border: 1px solid var(--primary); border-right: none;
            border-radius: 0 0 0 15px; padding: 15px;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.8);
        }

        .logo {
            width: 110px; height: 110px;
            border-radius: 50%; border: 3px solid var(--primary);
            margin: 15px; box-shadow: 0 0 25px var(--primary);
        }

        /* GRID & BUTTONS */
        .grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 15px; width: 90%; max-width: 850px; margin-top: 20px;
        }

        a {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05);
            padding: 12px; border-radius: 8px; text-align: center;
            font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Individual Hover Glows */
        .yt-btn:hover { background: var(--primary); box-shadow: 0 0 20px var(--primary); transform: translateY(-3px); }
        .rag-btn:hover { background: var(--ragnarok-brown); box-shadow: 0 0 20px var(--ragnarok-brown); transform: translateY(-3px); }
        .canva-btn:hover { background: var(--canva-blue); box-shadow: 0 0 20px var(--canva-blue); transform: translateY(-3px); }
        .gemini-btn:hover { background: var(--gemini-blue); box-shadow: 0 0 20px var(--gemini-blue); transform: translateY(-3px); }
        .wa-btn:hover { background: var(--wa-green); box-shadow: 0 0 20px var(--wa-green); transform: translateY(-3px); }
        .insta-btn:hover { background: var(--insta-pink); box-shadow: 0 0 20px var(--insta-pink); transform: translateY(-3px); }
        .chess-btn:hover { background: var(--chess-green); box-shadow: 0 0 20px var(--chess-green); transform: translateY(-3px); }

        .notes-container {
            margin-top: 25px; width: 450px; background: rgba(0, 0, 0, 0.7);
            padding: 15px; border-radius: 12px; border-bottom: 4px solid var(--primary);
        }
        textarea { background: transparent; border: none; color: #00ffcc; width: 100%; height: 50px; resize: none; outline: none; }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>

    <div class="stats-panel">
        <div style="font-size: 0.7rem; color: var(--primary); margin-bottom: 15px; letter-spacing: 2px;">● DIRECT SATELLITE DATA FEED</div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">SUBSCRIBERS</div>
                <div class="stat-value" id="sub-count">---</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">TOTAL VIEWS</div>
                <div class="stat-value" id="view-count">---</div>
            </div>
        </div>
    </div>

    <div class="drawer-container" id="drawer">
        <div class="drawer-handle" onclick="toggleDrawer()">RAGNAROK INTEL</div>
        <div class="drawer-content">
            <div style="font-size: 0.65rem; color: var(--primary); text-align:center; margin-bottom:10px; font-weight:bold;">● POPULATION SCANNER</div>
            <iframe src="https://discord.com/widget?id=1497250122701082638&theme=dark" width="100%" height="420" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
        </div>
    </div>

    <img src="https://yt3.googleusercontent.com/mY_xWQv45Jv9U1z_U2kRNtFmyiL3Q3-fxniRMiLI_mgo9RZ3p-yLl0Vhi5VJB4IydfzZhKcflA=s160-c-k-c0x00ffffff-no-rj" class="logo">
    <h2 style="letter-spacing: 8px; margin: 0;">RACH_1247</h2>

    <div class="grid">
        <a href="https://youtube.com" class="yt-btn">YouTube</a>
        <a href="https://studio.youtube.com" class="yt-btn">YT Studio</a>
        <a href="https://discord.com" class="rag-btn">Ragnarok</a>
        <a href="https://canva.com" class="canva-btn">Canva</a>
        <a href="https://gemini.google.com" class="gemini-btn">✧ GEMINI AI</a>
        <a href="https://web.whatsapp.com" class="wa-btn">WhatsApp</a>
        <a href="https://instagram.com" class="insta-btn">Instagram</a>
        <a href="https://chess.com" class="chess-btn">Chess.com</a>
    </div>

    <div class="notes-container">
        <textarea placeholder="Mission Log: Transformation Goals..."></textarea>
    </div>

    <script>
        const API_KEY = 'AIzaSyDUWRisY8JfHmuMxfD_FT7gYrFyLwzplvA'; 
        const CHANNEL_ID = 'UCyhIdIWbtKBldFp4HAaj50g';

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchYTData() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`);
                const data = await response.json();
                
                if (data.error) {
                    console.error("API Error:", data.error.message);
                    document.getElementById('sub-count').innerText = "LIMIT/ERR";
                    return;
                }

                if(data.items && data.items.length > 0) {
                    const stats = data.items[0].statistics;
                    document.getElementById('sub-count').innerText = Number(stats.subscriberCount).toLocaleString();
                    document.getElementById('view-count').innerText = Number(stats.viewCount).toLocaleString();
                } else {
                    document.getElementById('sub-count').innerText = "NOT FOUND";
                }
            } catch (error) {
                console.error("Fetch failed", error);
                document.getElementById('sub-count').innerText = "OFFLINE";
            }
        }
        fetchYTData();
        setInterval(fetchYTData, 300000); 
    </script>
</body>
</html>
